<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
<title>EduSuite Editor</title>
<link rel="stylesheet" href="plugins/css/pluginsCss.css">
<link rel="stylesheet" href="plugins/plugins.css">
<link rel="stylesheet" href="css/luckysheet.css">
<link rel="stylesheet" href="assets/iconfont/iconfont.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2e; }
#luckysheet { width: 100%; height: calc(100% - 40px); }
#savebar { height: 40px; background: #1e2030; display: flex; align-items: center; gap: 6px; padding: 0 8px; border-bottom: 1px solid #2a2d3e; flex-shrink: 0; }
#savebar span.title { color: #8888aa; font-size: 13px; margin-right: 8px; }
#savebar button { padding: 4px 10px; border-radius: 4px; border: none; font-size: 12px; cursor: pointer; font-weight: 600; white-space: nowrap; }
#savebar .spacer { flex: 1; }
#status { color: #8888aa; font-size: 11px; margin-left: 4px; }
.btn-save { background: #22c55e; color: #fff; }
.btn-save:hover { background: #16a34a; }
.btn-primary { background: #5e81f4; color: #fff; }
.btn-primary:hover { background: #4a6fd4; }
.btn-import { background: #f59e0b; color: #fff; }
.btn-import:hover { background: #d97706; }
.btn-outline { background: transparent; color: #8888aa; border: 1px solid #3a3d4e !important; }
.btn-outline:hover { background: #2a2d3e; color: #ccc; }
#fileInput { display: none; }
.dropdown { position: relative; display: inline-block; }
.dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #1e2030; border: 1px solid #2a2d3e; border-radius: 6px; min-width: 200px; z-index: 1000; max-height: 300px; overflow-y: auto; margin-top: 4px; }
.dropdown-content div { padding: 8px 12px; color: #ccc; font-size: 12px; cursor: pointer; border-bottom: 1px solid #2a2d3e; }
.dropdown-content div:hover { background: #2a2d3e; color: #fff; }
.dropdown-content .empty { color: #666; cursor: default; }
.dropdown-content .empty:hover { background: transparent; }
</style>
</head>
<body>
<div id="savebar">
  <span class="title">EduSuite Editor</span>
  <button class="btn-save" onclick="saveSheet()">Guardar</button>
  <button class="btn-import" onclick="document.getElementById('fileInput').click()">Importar Excel</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="importExcel(event)">
  <button class="btn-primary" onclick="saveAsTemplate()">Guardar como plantilla</button>
  <button class="btn-primary" style="background:#8b5cf6;" onclick="createSection()">+ Crear sección</button>
  <div class="dropdown" id="templateDropdown">
    <button class="btn-outline" onclick="toggleTemplates()">Nueva sección ▾</button>
    <div class="dropdown-content" id="templateList"></div>
  </div>
  <span class="spacer"></span>
  <span id="status"></span>
</div>
<div id="luckysheet"></div>
<script src="plugins/js/plugin.js"></script>
<script src="luckysheet.umd.min.js"></script>
<script>
var gridKey = 'ls-' + Date.now();
var _templatesCache = [];

function loadSheet(data) {
    if (data && data.name) document.querySelector('.title').textContent = data.name;
    var opts = {
        container: 'luckysheet',
        title: data.name || 'Editor',
        lang: 'es',
        showinfobar: true,
        showsheetbar: true,
        showtoolbar: true,
        enableAddRow: true,
        gridKey: gridKey,
        column: 26,
        row: 100,
        cellEditAhead: false,
        allowUpdate: true,
        myFolderUrl: null
    };
    if (data.sheetData && data.sheetData.length > 0) {
        opts.data = data.sheetData;
    }
    luckysheet.create(opts);
}

function saveSheet() {
    setStatus('Guardando...');
    try {
        var file = luckysheet.getluckysheetfile();
        var payload = JSON.stringify({
            gridKey: file.gridKey,
            name: file.title || 'Editor',
            sheetData: file.data
        });
        fetch('/save', { method: 'POST', body: payload })
            .then(function(r) { return r.json(); })
            .then(function(d) { setStatus('Guardado exitoso!'); })
            .catch(function(e) { setStatus('Error: ' + e.message); });
    } catch(e) {
        setStatus('Error: ' + e.message);
    }
}

function importExcel(event) {
    var file = event.target.files[0];
    if (!file) return;
    setStatus('Leyendo Excel...');
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var data = new Uint8Array(e.target.result);
            var wb = XLSX.read(data, { type: 'array', cellDates: true });
            var sheets = [];
            wb.SheetNames.forEach(function(name) {
                var ws = wb.Sheets[name];
                var ref = ws['!ref'];
                if (!ref) return;
                    var range = XLSX.utils.decode_range(ref);
                var celldata = [];
                for (var r = range.s.r; r <= range.e.r; r++) {
                    for (var c = range.s.c; c <= range.e.c; c++) {
                        var addr = XLSX.utils.encode_cell({ r: r, c: c });
                        var cell = ws[addr];
                        if (!cell) continue;
                        var v = cell.v;
                        var m = cell.w || String(v);
                        if (v instanceof Date) {
                            v = v.toISOString().split('T')[0];
                            m = v;
                        }
                        celldata.push({ r: r, c: c, v: { v: v, m: m } });
                    }
                }
                sheets.push({ name: name, celldata: celldata, config: {} });
            });
            var sheetData = luckysheet.getluckysheetfile();
            var existing = sheetData && sheetData.data ? sheetData.data.length : 0;
            sheets.forEach(function(s, i) {
                luckysheet.addSheet({
                    sheetName: s.name,
                    sheetData: s.celldata,
                    index: existing + i + 1
                });
            });
            setStatus('Importado: ' + sheets.length + ' hoja(s)');
        } catch(err) {
            setStatus('Error al importar: ' + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
    event.target.value = '';
}

function saveAsTemplate() {
    setStatus('Guardando plantilla...');
    try {
        var file = luckysheet.getluckysheetfile();
        var name = 'Plantilla ' + (new Date().toLocaleDateString());
        var payload = JSON.stringify({
            name: name,
            sheetData: file.data
        });
        fetch('/save_template', { method: 'POST', body: payload })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                setStatus('Plantilla guardada: ' + name);
                loadTemplates();
            })
            .catch(function(e) { setStatus('Error: ' + e.message); });
    } catch(e) {
        setStatus('Error: ' + e.message);
    }
}

function loadTemplates() {
    fetch('/templates')
        .then(function(r) { return r.json(); })
        .then(function(list) {
            _templatesCache = list;
            var el = document.getElementById('templateList');
            if (!list || list.length === 0) {
                el.innerHTML = '<div class="empty">Sin plantillas guardadas</div>';
                return;
            }
            el.innerHTML = list.map(function(t) {
                return '<div onclick="loadTemplate(' + t.id + ')">' + t.name + '</div>';
            }).join('');
        })
        .catch(function() {});
}

function toggleTemplates() {
    loadTemplates();
    var el = document.getElementById('templateList');
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function loadTemplate(templateId) {
    document.getElementById('templateList').style.display = 'none';
    setStatus('Cargando plantilla...');
    fetch('/load_template?id=' + templateId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data && data.sheetData) {
                data.sheetData.forEach(function(sheet) {
                    luckysheet.addSheet({
                        sheetName: sheet.name || 'Seccion',
                        sheetData: sheet.celldata || []
                    });
                });
                setStatus('Plantilla cargada como nueva seccion');
            }
        })
        .catch(function(e) { setStatus('Error: ' + e.message); });
}

function createSection() {
    var name = prompt('Nombre de la nueva seccion:', '');
    if (!name) return;
    setStatus('Creando seccion...');
    try {
        var file = luckysheet.getluckysheetfile();
        var firstSheet = file.data && file.data[0];
        var headers = [];
        if (firstSheet && firstSheet.celldata) {
            var row0 = firstSheet.celldata.filter(function(c) { return c.r === 0; });
            row0.sort(function(a, b) { return a.c - b.c; });
            row0.forEach(function(c) { headers.push({ name: String(c.v.v || c.v.m || 'Col' + (c.c+1)) }); });
        }
        if (headers.length === 0) {
            headers = [{ name: 'Columna 1' }];
        }
        var key = 'sec_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_');
        var payload = JSON.stringify({ name: name, key: key, columns: headers, icon: '📄' });
        fetch('/create_section', { method: 'POST', body: payload })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.status === 'ok') {
                    setStatus('Seccion creada: ' + name + ' (recarga la app)');
                } else {
                    setStatus('Error: ' + (d.msg || 'desconocido'));
                }
            })
            .catch(function(e) { setStatus('Error: ' + e.message); });
    } catch(e) {
        setStatus('Error: ' + e.message);
    }
}

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
    setTimeout(function() { setStatus(''); }, 3000);
}

document.addEventListener('click', function(e) {
    var dd = document.getElementById('templateList');
    if (dd && dd.style.display === 'block' && !e.target.closest('.dropdown')) {
        dd.style.display = 'none';
    }
});

fetch('/data').then(function(r) { return r.json(); }).then(function(d) {
    loadSheet(d);
}).catch(function(e) {
    document.getElementById('savebar').innerHTML = '<span style="color:#ef4444;">Error al cargar datos: ' + e.message + '</span>';
});
</script>
</body>
</html>
