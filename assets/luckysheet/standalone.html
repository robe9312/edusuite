<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
<title>EduSuite Editor</title>
<link rel="stylesheet" href="plugins/css/pluginsCss.css">
<link rel="stylesheet" href="plugins/plugins.css">
<link rel="stylesheet" href="css/luckysheet.css">
<link rel="stylesheet" href="assets/iconfont/iconfont.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2e; }
#luckysheet { width: 100%; height: calc(100% - 40px); }
#savebar { height: 40px; background: #1e2030; display: flex; align-items: center; gap: 6px; padding: 0 8px; border-bottom: 1px solid #2a2d3e; flex-shrink: 0; }
#savebar span.title { color: #8888aa; font-size: 13px; margin-right: 8px; }
#savebar button { padding: 4px 10px; border-radius: 4px; border: none; font-size: 12px; cursor: pointer; font-weight: 600; white-space: nowrap; }
#savebar .spacer { flex: 1; }
#status { color: #8888aa; font-size: 11px; margin-left: 4px; min-width: 120px; text-align: right; }
.btn-save { background: #22c55e; color: #fff; }
.btn-save:hover { background: #16a34a; }
.btn-primary { background: #5e81f4; color: #fff; }
.btn-primary:hover { background: #4a6fd4; }
.btn-import { background: #f59e0b; color: #fff; }
.btn-import:hover { background: #d97706; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-outline { background: transparent; color: #8888aa; border: 1px solid #3a3d4e !important; }
.btn-outline:hover { background: #2a2d3e; color: #ccc; }
#fileInput { display: none; }
.savebar-title { color: #fff; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
<div id="savebar">
  <span class="savebar-title">EduSuite Editor — Plantillas</span>
  <span class="spacer"></span>
  <span id="status"></span>
  <button class="btn-save" onclick="doSave()">Guardar</button>
</div>
<div id="luckysheet"></div>

<script src="plugins/js/plugin.js"></script>
<script src="luckysheet.umd.min.js"></script>
<script>
var gridKey = 'ls-' + Date.now();
var _autoSaveTimer = null;
var _saving = false;

var isHeadless = location.search.indexOf('mode=headless') !== -1;

/*
 * Protocolo EduSuite ↔ Luckysheet (headless)
 * ──────────────────────────────────────────
 * Mensajes entrantes (Qt → JS via runJavaScript):
 *   {type:"loadWorkbook", data:[sheets]}
 *   {type:"setCell",       sheet, row, col, value}
 *   {type:"setRange",      sheet, cells:[{row,col,value},...]}
 *   {type:"clearRange",    sheet, startRow, startCol, endRow, endCol}
 *   {type:"getWorkbook"}
 *   {type:"saveWorkbook"}   — reservado
 *   {type:"insertRow"}      — reservado
 *   {type:"deleteRow"}      — reservado
 *   {type:"insertColumn"}   — reservado
 *   {type:"deleteColumn"}   — reservado
 *   {type:"merge"}          — reservado
 *   {type:"unmerge"}        — reservado
 *   {type:"undo"}           — reservado
 *   {type:"redo"}           — reservado
 *   {type:"copy"}           — reservado
 *   {type:"paste"}          — reservado
 *   {type:"getSelection"}   — reservado
 *
 * Mensajes salientes (JS → Qt via return value):
 *   {type:"changed", sheet, cells:[{r,c,v}]}
 *   {type:"workbook", data:[{name,celldata,config}]}
 *   {type:"error", message}
 *
 * cell.v es el diccionario completo de la celda Luckysheet {v,m,f,bg,fc,...}
 * cells contiene solo las celdas que cambiaron (diff), nunca el workbook completo.
 */

if (isHeadless) {
    document.getElementById('savebar').style.display = 'none';
    document.getElementById('luckysheet').style.height = '100%';
    var _engineSheet = null;

    window.__engineLoadWorkbook = function(data) {
        if (_engineSheet) { luckysheet.destroy(); _engineSheet = null; }
        var opts = {
            container: 'luckysheet', lang: 'es',
            showinfobar: false, showsheetbar: false, showtoolbar: false,
            enableAddRow: false, enableAddBackTop: false,
            gridKey: 'ls-headless-' + Date.now(),
            column: 26, row: 100, cellEditAhead: false, allowUpdate: true,
            myFolderUrl: null
        };
        if (data) opts.data = Array.isArray(data) ? data : [];
        luckysheet.create(opts);
        _engineSheet = luckysheet.getluckysheetfile();
    };

    function _snapshotFormulas(files, si) {
        var f = files[si];
        if (!f) return {};
        var snap = {};
        var cells = f.celldata || [];
        for (var i = 0; i < cells.length; i++) {
            var c = cells[i];
            if (c.v && typeof c.v === 'object' && c.v.f) {
                snap[c.r + ':' + c.c] = JSON.parse(JSON.stringify(c.v));
            }
        }
        return snap;
    }

    function _findCell(celldata, r, c) {
        for (var i = 0; i < celldata.length; i++) {
            if (celldata[i].r === r && celldata[i].c === c) return JSON.parse(JSON.stringify(celldata[i].v));
        }
        return null;
    }

    function _doEdit(si, editFn) {
        var files = _engineSheet;
        if (!Array.isArray(files)) files = [files];
        var file = files[si];
        if (!file) return JSON.stringify({type:'error',message:'Sheet index out of range: '+si});

        if (si > 0) { try { luckysheet.setSheetActive(si); } catch(e) {} }

        var formulaBefore = _snapshotFormulas(files, si);

        editFn(file);

        var newCells = file.celldata || [];
        var changed = [];

        for (var i = 0; i < newCells.length; i++) {
            var cell = newCells[i];
            if (cell.v && typeof cell.v === 'object' && cell.v.f) {
                var key = cell.r + ':' + cell.c;
                if (JSON.stringify(cell.v) !== JSON.stringify(formulaBefore[key])) {
                    changed.push({r: cell.r, c: cell.c, v: cell.v});
                }
            }
        }

        _engineSheet = luckysheet.getluckysheetfile();
        return JSON.stringify({type:'changed', sheet: si, cells: changed});
    }

    window.__engineHandleMessage = function(msg) {
        if (!_engineSheet) return JSON.stringify({type:'error',message:'Engine not loaded'});

        if (msg.type === 'setCell') {
            var si = msg.sheet || 0;
            var editedBefore = _findCell((_engineSheet[si] || {}).celldata || [], msg.row, msg.col);
            return _doEdit(si, function(file) {
                luckysheet.setCellValue(msg.row, msg.col, msg.value);
            });
        }

        if (msg.type === 'setRange') {
            var si = msg.sheet || 0;
            return _doEdit(si, function(file) {
                for (var i = 0; i < msg.cells.length; i++) {
                    var c = msg.cells[i];
                    luckysheet.setCellValue(c.row, c.col, c.value);
                }
            });
        }

        if (msg.type === 'clearRange') {
            var si = msg.sheet || 0;
            return _doEdit(si, function(file) {
                var sr = msg.startRow, sc = msg.startCol;
                var er = msg.endRow, ec = msg.endCol;
                for (var r = sr; r <= er; r++) {
                    for (var c = sc; c <= ec; c++) {
                        luckysheet.setCellValue(r, c, '');
                    }
                }
            });
        }

        if (msg.type === 'getWorkbook') {
            return JSON.stringify({type:'workbook', data:(function(){
                var fs = luckysheet.getluckysheetfile();
                return (Array.isArray(fs) ? fs : [fs]).map(function(f){
                    return {name:f.name, celldata:f.celldata||[], config:f.config||{}};
                });
            })()});
        }
        return JSON.stringify({type:'error',message:'Unknown type: '+msg.type});
    };
} else {
    function loadSheet(data) {
    data = data || { sheetData: [], name: 'Editor' };
    var titleEl = document.querySelector('.savebar-title');
    if (data.name && titleEl) titleEl.textContent = data.name;
    var opts = {
        container: 'luckysheet',
        title: data.name || 'Editor',
        lang: 'es',
        showinfobar: true,
        showsheetbar: true,
        showtoolbar: true,
        enableAddRow: true,
        gridKey: gridKey,
        column: 26,
        row: 100,
        cellEditAhead: false,
        allowUpdate: true,
        myFolderUrl: null
    };
    if (data.sheetData && data.sheetData.length > 0) {
        opts.data = data.sheetData;
    }
    luckysheet.create(opts);
    if (typeof luckysheet.on === 'function') {
        luckysheet.on('cellEdited', function () { scheduleSave(true); });
        luckysheet.on('sheetActivate', function () { scheduleSave(false); });
    }
    if (window.autoSaveReady) startAutoSave();
    scheduleSave(true);
}

var _saveDebounce = null;
function scheduleSave(immediate) {
    if (_saveDebounce) clearTimeout(_saveDebounce);
    if (immediate) {
        _saveDebounce = setTimeout(function () { _saveDebounce = null; doSave(); }, 600);
    } else {
        _saveDebounce = setTimeout(function () { _saveDebounce = null; doSave(); }, 1500);
    }
}

function getSheetData() {
    var files = luckysheet.getluckysheetfile();
    if (!Array.isArray(files)) files = [files];
    var sheets = files.map(function(f) {
        var celldata = f.celldata;
        if (!celldata || celldata.length === 0) {
            celldata = [];
            var grid = f.data;
            if (grid && Array.isArray(grid)) {
                for (var r = 0; r < grid.length; r++) {
                    var row = grid[r];
                    if (!Array.isArray(row)) continue;
                    for (var c = 0; c < row.length; c++) {
                        var cell = row[c];
                        if (cell !== null && cell !== undefined) {
                            celldata.push({r: r, c: c, v: cell});
                        }
                    }
                }
            }
        }
        return { name: f.name, celldata: celldata, config: f.config || {} };
    });
    return { gridKey: (files[0] || {}).gridKey, title: (files[0] || {}).title || 'Editor', sheetData: sheets };
}

function doSave() {
    if (_saving) return;
    _saving = true;
    setStatus('Guardando...');
    var sd = getSheetData();
    fetch('/save', {
        method: 'POST',
        body: JSON.stringify({ gridKey: sd.gridKey, name: sd.title, sheetData: sd.sheetData })
    }).then(function(r) { return r.json(); }).then(function(d) {
        setStatus('Guardado');
        _saving = false;
    }).catch(function() {
        setStatus('Error al guardar');
        _saving = false;
    });
}

function autoSave() {
    if (_saving) return;
    var sd = getSheetData();
    fetch('/save', {
        method: 'POST',
        body: JSON.stringify({ gridKey: sd.gridKey, name: sd.title, sheetData: sd.sheetData })
    }).then(function(r) { return r.json(); }).then(function() {
        setStatus('Autoguardado');
    }).catch(function() {});
}

function startAutoSave() {
    if (_autoSaveTimer) clearInterval(_autoSaveTimer);
    _autoSaveTimer = setInterval(autoSave, 10000);
}

function setStatus(msg) {
    var el = document.getElementById('status');
    if (el) el.textContent = msg;
    if (msg) setTimeout(function() { setStatus(''); }, 3000);
}

function syncSendSave(bodyStr) {
    try {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/save', false);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.send(bodyStr);
    } catch (e) {}
}

window.addEventListener('beforeunload', function () {
    try {
        var sd = getSheetData();
        var payload = JSON.stringify({ gridKey: sd.gridKey, name: sd.title, sheetData: sd.sheetData });
        syncSendSave(payload);
    } catch (e) {}
});
window.addEventListener('pagehide', function () {
    try {
        var sd = getSheetData();
        var payload = JSON.stringify({ gridKey: sd.gridKey, name: sd.title, sheetData: sd.sheetData });
        syncSendSave(payload);
    } catch (e) {}
});

}
if (!isHeadless) {
    fetch('/data').then(function(r) { return r.json(); }).then(function(d) {
        window.autoSaveReady = true;
        loadSheet(d);
    }).catch(function(e) {
        document.getElementById('savebar').innerHTML = '<span style="color:#ef4444;">Error al cargar datos: ' + e.message + '</span>';
    });
}
</script>
</body>
</html>
