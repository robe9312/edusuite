<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
<title>EduSuite Editor</title>
<link rel="stylesheet" href="plugins/css/pluginsCss.css">
<link rel="stylesheet" href="plugins/plugins.css">
<link rel="stylesheet" href="css/luckysheet.css">
<link rel="stylesheet" href="assets/iconfont/iconfont.css">
<script src="plugins/js/plugin.js"></script>
<script src="luckysheet.umd.min.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2e; }
#luckysheet { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="luckysheet"></div>
<script>
var bridge = null;
var currentWorkbookId = null;

function initBridge() {
    try {
        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
            if (bridge && currentWorkbookId !== null) {
                bridge.requestWorkbookData(currentWorkbookId);
            }
        });
    } catch(e) {
        console.warn("QWebChannel not available:", e);
    }
}

function loadWorkbook(jsonStr) {
    try {
        var data = JSON.parse(jsonStr);
        var options = {
            container: 'luckysheet',
            title: data.name || 'Editor',
            lang: 'es',
            showinfobar: true,
            showsheetbar: true,
            showtoolbar: true,
            enableAddRow: true,
            enableAddBackTop: true,
            myFolderUrl: null,
            allowUpdate: true,
            gridKey: data.gridKey || uuid(),
            column: 26,
            row: 100,
            cellEditAhead: false
        };
        if (data.sheetData) {
            options.data = data.sheetData;
        }
        luckysheet.create(options);
        currentWorkbookId = data.id || null;
    } catch(e) {
        console.error("Error loading workbook:", e);
    }
}

function saveToPython() {
    if (!bridge || !bridge.saveWorkbook) return;
    try {
        var file = luckysheet.getLuckysheetFile();
        var payload = JSON.stringify({
            id: currentWorkbookId,
            gridKey: file.gridKey,
            sheetData: file.data
        });
        bridge.saveWorkbook(payload);
    } catch(e) {
        console.error("Error saving workbook:", e);
    }
}

function uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}

initBridge();
</script>
</body>
</html>
